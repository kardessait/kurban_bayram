<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurban Bayramı</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07091a;min-height:100vh;overflow:hidden;position:relative;font-family:'Georgia',serif}
#stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;background:white;border-radius:50%;animation:twinkle 2s infinite alternate}
@keyframes twinkle{from{opacity:.2}to{opacity:1}}
#ground{position:fixed;bottom:0;width:100%;height:170px;z-index:1;background:linear-gradient(to top,#0f2e0f,#1a4a1a,#2d6b2d)}
.moon{position:fixed;top:35px;right:75px;width:65px;height:65px;background:#fffbe0;border-radius:50%;box-shadow:0 0 25px 10px rgba(255,250,150,.55),0 0 70px 25px rgba(255,220,80,.22);z-index:2;animation:mgl 3s ease-in-out infinite alternate}
.crescent{position:fixed;top:22px;right:52px;font-size:30px;z-index:3;filter:drop-shadow(0 0 8px gold)}
@keyframes mgl{from{opacity:.85}to{opacity:1}}
.lantern{position:fixed;z-index:3;display:flex;flex-direction:column;align-items:center;animation:swg 4s ease-in-out infinite;transform-origin:top center}
.ls{width:2px;height:28px;background:#8B7355}
.lb{width:26px;height:38px;border-radius:50% 50% 40% 40%;display:flex;align-items:center;justify-content:center;font-size:14px}
.lt{width:5px;height:12px;border-radius:0 0 4px 4px;margin-top:-2px}
@keyframes swg{0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
.l1{top:0;left:7%;animation-delay:0s}.l2{top:0;left:21%;animation-delay:.5s}.l3{top:0;left:37%;animation-delay:1s}.l4{top:0;left:53%;animation-delay:.3s}.l5{top:0;left:69%;animation-delay:.8s}.l6{top:0;left:84%;animation-delay:1.3s}
.lbr{background:radial-gradient(ellipse,#ff7070,#bb0000);box-shadow:0 0 16px 5px rgba(255,40,40,.7)}
.ltr{background:#990000}
.lbg{background:radial-gradient(ellipse,#ffd700,#a07800);box-shadow:0 0 16px 5px rgba(255,210,0,.7)}
.ltg{background:#7a5c00}
.lbgr{background:radial-gradient(ellipse,#55ff55,#004400);box-shadow:0 0 16px 5px rgba(40,220,40,.7)}
.ltgr{background:#003300}
#title{position:fixed;top:75px;width:100%;text-align:center;z-index:10;font-size:clamp(20px,4.2vw,50px);font-weight:bold;letter-spacing:3px;color:#fff;font-family:'Georgia',serif;text-shadow:0 0 8px #fff,0 0 22px #ffd700,0 0 45px #ffd700,0 0 90px #ff8c00;opacity:0;animation:fsi 3s ease forwards .5s,npulse 2.5s ease-in-out infinite 3.5s}
#sub{position:fixed;top:148px;width:100%;text-align:center;z-index:10;font-size:clamp(13px,2.3vw,24px);color:#ffd700;font-family:'Georgia',serif;text-shadow:0 0 7px #ffd700,0 0 20px #ff8c00;opacity:0;animation:fsi 3s ease forwards 2s;letter-spacing:2px}
@keyframes fsi{0%{opacity:0;transform:translateY(-16px)}100%{opacity:1;transform:translateY(0)}}
@keyframes npulse{0%,100%{text-shadow:0 0 8px #fff,0 0 22px #ffd700,0 0 45px #ffd700,0 0 90px #ff8c00}50%{text-shadow:0 0 16px #fff,0 0 45px #ffd700,0 0 90px #ff8c00,0 0 130px #ff4500}}
canvas#sc{position:fixed;bottom:0;left:0;width:100%;height:230px;z-index:5;pointer-events:none}
.ff{position:fixed;width:4px;height:4px;border-radius:50%;background:#ffd700;box-shadow:0 0 7px 3px rgba(255,215,0,.8);z-index:4;animation:fff linear infinite}
@keyframes fff{0%{transform:translate(0,0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translate(var(--dx),var(--dy));opacity:0}}
</style>
</head>
<body>
<div id="stars"></div>
<div class="moon"></div>
<div class="crescent">☪</div>
<div class="lantern l1"><div class="ls"></div><div class="lb lbr">🕯</div><div class="lt ltr"></div></div>
<div class="lantern l2"><div class="ls"></div><div class="lb lbg">🕯</div><div class="lt ltg"></div></div>
<div class="lantern l3"><div class="ls"></div><div class="lb lbgr">🕯</div><div class="lt ltgr"></div></div>
<div class="lantern l4"><div class="ls"></div><div class="lb lbr">🕯</div><div class="lt ltr"></div></div>
<div class="lantern l5"><div class="ls"></div><div class="lb lbg">🕯</div><div class="lt ltg"></div></div>
<div class="lantern l6"><div class="ls"></div><div class="lb lbgr">🕯</div><div class="lt ltgr"></div></div>
<div id="title">🌙 KURBAN BAYRAMINIZ KUTLU OLSUN 🌙</div>
<div id="sub">✨ Hayırlı Bayramlar Dileriz ✨</div>
<div id="ground"></div>
<canvas id="sc"></canvas>
<script>
const starsEl=document.getElementById('stars');
for(let i=0;i<130;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.5+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*72}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1.5+Math.random()*2}s;`;
  starsEl.appendChild(s);
}
for(let i=0;i<18;i++){
  const f=document.createElement('div');f.className='ff';
  f.style.cssText=`left:${Math.random()*window.innerWidth}px;top:${Math.random()*window.innerHeight*.6+50}px;--dx:${(Math.random()-.5)*280}px;--dy:${(Math.random()-.5)*180}px;animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*5}s;`;
  document.body.appendChild(f);
}

const canvas=document.getElementById('sc');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=230;}
resize();
window.addEventListener('resize',resize);

function drawCuteSheep(ctx,x,y,sc,dir,legPhase,blinking,t){
  ctx.save();
  ctx.translate(x,y);
  if(dir===-1) ctx.scale(-1,1);
  ctx.scale(sc,sc);

  const bob=Math.sin(t*1.4+legPhase)*2.5;
  const lswing=Math.sin(legPhase)*8;

  const legColor='#c8a07a';
  const legDark='#a07850';
  const legs=[{x:-22,sw:-lswing},{x:-8,sw:lswing},{x:8,sw:-lswing},{x:22,sw:lswing}];
  legs.forEach(l=>{
    ctx.beginPath();
    ctx.roundRect(l.x+l.sw*0.3-5,38+bob,10,22,5);
    ctx.fillStyle=legColor;
    ctx.fill();
    ctx.strokeStyle=legDark;
    ctx.lineWidth=0.8;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(l.x+l.sw*0.5,62+bob,6,4,0,0,Math.PI*2);
    ctx.fillStyle='#7a5a3a';
    ctx.fill();
  });

  const bodyPuffs=[
    {x:0,  y:10+bob,rx:36,ry:32},
    {x:-28,y:18+bob,rx:22,ry:20},
    {x:28, y:18+bob,rx:22,ry:20},
    {x:-18,y:-8+bob,rx:24,ry:20},
    {x:18, y:-8+bob,rx:24,ry:20},
    {x:0,  y:-18+bob,rx:26,ry:20},
    {x:-32,y:4+bob,rx:18,ry:16},
    {x:32, y:4+bob,rx:18,ry:16},
    {x:-10,y:26+bob,rx:20,ry:16},
    {x:10, y:26+bob,rx:20,ry:16},
  ];

  bodyPuffs.forEach(p=>{
    ctx.beginPath();
    ctx.ellipse(p.x,p.y,p.rx,p.ry,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(p.x-p.rx*0.3,p.y-p.ry*0.3,2,p.x,p.y,p.rx);
    g.addColorStop(0,'#ffffff');
    g.addColorStop(0.55,'#f5f3f0');
    g.addColorStop(1,'#dedad4');
    ctx.fillStyle=g;
    ctx.fill();
    ctx.strokeStyle='rgba(200,198,194,0.5)';
    ctx.lineWidth=0.6;
    ctx.stroke();
  });
  bodyPuffs.forEach(p=>{
    ctx.beginPath();
    ctx.ellipse(p.x-p.rx*0.25,p.y-p.ry*0.28,p.rx*0.22,p.ry*0.2,-0.3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.fill();
  });

  const hy=-42+bob;
  ctx.beginPath();
  ctx.ellipse(0,hy,26,24,0,0,Math.PI*2);
  const hg=ctx.createRadialGradient(-5,hy-6,3,0,hy,26);
  hg.addColorStop(0,'#f5e8d8');
  hg.addColorStop(1,'#e8d0b8');
  ctx.fillStyle=hg;
  ctx.fill();
  ctx.strokeStyle='#c8a880';
  ctx.lineWidth=0.8;
  ctx.stroke();

  const headWool=[
    {x:-10,y:hy-20,rx:14,ry:12},
    {x:5,  y:hy-22,rx:15,ry:12},
    {x:-20,y:hy-10,rx:12,ry:10},
    {x:20, y:hy-10,rx:12,ry:10},
    {x:0,  y:hy-28,rx:12,ry:10},
  ];
  headWool.forEach(p=>{
    ctx.beginPath();
    ctx.ellipse(p.x,p.y,p.rx,p.ry,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(p.x-3,p.y-3,1,p.x,p.y,p.rx);
    g.addColorStop(0,'#ffffff');
    g.addColorStop(0.6,'#f5f3f0');
    g.addColorStop(1,'#dedad4');
    ctx.fillStyle=g;
    ctx.fill();
    ctx.strokeStyle='rgba(200,198,194,0.4)';
    ctx.lineWidth=0.5;
    ctx.stroke();
  });

  [-1,1].forEach(side=>{
    ctx.beginPath();
    ctx.ellipse(side*28,hy+2,10,7,side*0.5,0,Math.PI*2);
    ctx.fillStyle='#e8d0b8';
    ctx.fill();
    ctx.strokeStyle='#c8a880';
    ctx.lineWidth=0.7;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(side*28,hy+2,6,4,side*0.5,0,Math.PI*2);
    ctx.fillStyle='#f0b0b8';
    ctx.fill();
  });

  [-1,1].forEach(side=>{
    const ex=side*10;
    const ey=hy-4;
    ctx.beginPath();
    ctx.ellipse(ex,ey,7,7.5,0,0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.fill();
    ctx.strokeStyle='#b09070';
    ctx.lineWidth=0.6;
    ctx.stroke();
    if(!blinking){
      ctx.beginPath();
      ctx.ellipse(ex+0.5,ey+0.5,4.5,5,0,0,Math.PI*2);
      ctx.fillStyle='#6b3a1f';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(ex+0.8,ey+0.5,2.5,3,0,0,Math.PI*2);
      ctx.fillStyle='#1a0a00';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex+2,ey-1.5,1.3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex-1,ey+2,0.7,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,0.5)';
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(ex,ey-5,6.5,2.5,0,0,Math.PI);
      ctx.fillStyle='#4a2a10';
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.moveTo(ex-7,ey);
      ctx.quadraticCurveTo(ex,ey+5,ex+7,ey);
      ctx.fillStyle='#e8d0b8';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ex-7,ey);
      ctx.quadraticCurveTo(ex,ey+5,ex+7,ey);
      ctx.strokeStyle='#4a2a10';
      ctx.lineWidth=1.5;
      ctx.stroke();
    }
  });

  [-1,1].forEach(side=>{
    ctx.beginPath();
    ctx.ellipse(side*16,hy+6,8,5,0,0,Math.PI*2);
    ctx.fillStyle='rgba(255,160,160,0.35)';
    ctx.fill();
  });

  ctx.beginPath();
  ctx.ellipse(0,hy+10,9,7,0,0,Math.PI*2);
  const ng=ctx.createRadialGradient(-2,hy+8,1,0,hy+10,9);
  ng.addColorStop(0,'#ffb8c0');
  ng.addColorStop(1,'#e890a0');
  ctx.fillStyle=ng;
  ctx.fill();
  ctx.strokeStyle='#d07080';
  ctx.lineWidth=0.6;
  ctx.stroke();
  [-1,1].forEach(side=>{
    ctx.beginPath();
    ctx.ellipse(side*3.5,hy+11,2,2.5,0,0,Math.PI*2);
    ctx.fillStyle='#c06070';
    ctx.fill();
  });

  ctx.beginPath();
  ctx.moveTo(-6,hy+17);
  ctx.quadraticCurveTo(0,hy+22,6,hy+17);
  ctx.strokeStyle='#c07080';
  ctx.lineWidth=1.2;
  ctx.lineCap='round';
  ctx.stroke();

  ctx.restore();
}

const sheep=[];
for(let i=0;i<5;i++){
  const dir=Math.random()>.5?1:-1;
  sheep.push({
    x:Math.random()*window.innerWidth,
    y:65+Math.random()*50,
    dir,
    speed:0.3+Math.random()*0.4,
    scale:0.62+Math.random()*0.4,
    legPhase:Math.random()*Math.PI*2,
    blinkTimer:150+Math.random()*250,
    blinking:false,
  });
}

let t=0;
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  t+=0.016;
  sheep.forEach(s=>{
    s.x+=s.dir*s.speed;
    s.legPhase+=0.045*s.speed*2.5;
    s.blinkTimer--;
    if(s.blinkTimer<=0){
      s.blinking=true;
      setTimeout(()=>{s.blinking=false;},110);
      s.blinkTimer=160+Math.random()*240;
    }
    if(s.x>canvas.width+200) s.x=-160;
    if(s.x<-200) s.x=canvas.width+160;
    drawCuteSheep(ctx,s.x,s.y,s.scale,s.dir,s.legPhase,s.blinking,t);
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
